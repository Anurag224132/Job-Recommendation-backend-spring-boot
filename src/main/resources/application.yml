server:
  port: ${PORT:8080}

spring:
  application:
    name: job_recommendation_backend

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

  cloud:
    aws:
      region:
        static: eu-north-1
      credentials:
        access-key: ${AWS_ACCESS_KEY}
        secret-key: ${AWS_SECRET_KEY}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# ML Service Configuration
ml:
  api:
    url: ${ML_API_URL}

# Google OAuth Configuration
google:
  client:
    id: ${GOOGLE_CLIENT_ID}
    secret: ${GOOGLE_CLIENT_SECRET}
  refresh:
    token: ${GOOGLE_REFRESH_TOKEN}

# Security Configuration
jwt:
  secret: ${JWT_SECRET}

# Queue Configuration
queue:
  notification: ${NOTIFICATION_QUEUE:coinshift-notification-queue}

brevo:
  api-key: ${BREVO_API_KEY:}
  from-email: ${BREVO_FROM_EMAIL:}
  from-name: ${BREVO_FROM_NAME:SkillSparTeam}

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
  otlp:
    metrics:
      export:
        # Set GRAFANA_OTLP_URL on Render to: https://otlp-gateway-prod-ap-south-1.grafana.net/otlp/v1/metrics
        url: ${GRAFANA_OTLP_URL:}
        headers:
          Authorization: ${GRAFANA_OTLP_AUTH:}
        step: 30s
        resource-attributes:
          service.name: ${spring.application.name}
          deployment.environment: ${RENDER_SERVICE_NAME:local}
  metrics:
    tags:
      application: ${spring.application.name}